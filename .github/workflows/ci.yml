name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Bevy's default Linux build links against ALSA, udev, wayland, and
      # xkbcommon; pkg-config wires them up.
      - name: Install Bevy system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Enable sccache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          # Incremental compilation produces unique artifacts that defeat
          # sccache's per-unit hashing — disable it on CI.
          echo "CARGO_INCREMENTAL=0" >> "$GITHUB_ENV"

      - run: cargo test --locked

      - name: sccache stats
        run: sccache --show-stats
